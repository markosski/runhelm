id: simple-function-workflow

tasks:
  - id: summarize_user
    kind:
      Function:
        dependencies:
          - name: lodash-es
            version: 4.17.21
        code: |
          import { startCase } from "lodash-es";

          export default async function run(ctx) {
            return {
              response: startCase("hello world from runhelm")
            };
          }
    input_schemas: []
    output_schema:
      type: object
      required:
        - response
      properties:
        response:
          type: string
    expected_side_effects: []
    required_credentials: []

data_bindings: []
