id: simple-agent-workflow

tasks:
  - id: test
    kind:
      Agent:
        model_id: "google/gemini-3-flash-preview"
        provider_url: ""
        prompt: |
          Perform the following actions:
          - Use curl to access www.marcinkossakowski.com
          - Download the content to /tmp/marcin.html
          - Extract the title of the page and return as response

          {
            "response": "summary text including the close date, close price, trend direction, and source",
          }
        tools: ["read", "write", "edit"]
        skills: []
        ask: false
        schema_failure_retry_times: 2
    input_schemas: []
    output_schema:
      type: object
      required:
        - response
      properties:
        response:
          type: string
    expected_side_effects: []
    required_credentials:
      - llm_api_key
  - id: pull_stocks
    kind:
      Agent:
        model_id: "google/gemini-3-flash-preview"
        provider_url: ""
        prompt: |
          Find most recent (based on current date) closing stock price for Apple Inc. (AAPL) and Microsoft Corporation (MSFT) and summarize the trend in a sentence.
          It is required for you to use real information from the internet, do not attempt to recall from memory.

          You must call the tools to fetch stock information. Base the answer only on those tool results.
          If a value is missing from tool results, state that it could not be verified instead of guessing.

          You can use bash tool to check current date with `date`

          Return exactly this JSON shape:
          {
            "response": "summary text including the close date, close price, trend direction, and source",
            "now_date": "05/18/2026"
            "quotes": [
              {
                "symbol": "AAPL",
                "latestClose": 123.45,
                "latestCloseTime": "ISO timestamp from tool",
                "trendFromPreviousClose": "up|down|flat|unknown",
                "sourceUrl": "URL from tool"
              },
              {
                "symbol": "MSFT",
                "latestClose": 123.45,
                "latestCloseTime": "ISO timestamp from tool",
                "trendFromPreviousClose": "up|down|flat|unknown",
                "sourceUrl": "URL from tool"
              }
            ]
          }
        tools: ["read", "write", "edit", "web_search", "bash"]
        skills: ["brave-web-search"]
        ask: false
        schema_failure_retry_times: 2
    input_schemas: []
    output_schema:
      type: object
      required:
        - response
      properties:
        response:
          type: string
        now_date:
          type: string
        quotes:
          type: array
    expected_side_effects: []
    required_credentials:
      - llm_api_key

data_bindings:
  - source_task_id: fetch_user
    target_task_id: summarize_user
    target_input_index: 0
