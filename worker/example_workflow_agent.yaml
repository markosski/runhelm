id: simpleagentworkflow

tasks:
  - id: pullstocks
    kind:
      Agent:
        model_id: "google/gemini-3-flash-preview"
        provider_url: ""
        prompt: |
          Find most recent (based on current date) closing stock price for Apple Inc. (AAPL) and Microsoft Corporation (MSFT) and summarize the trend in a sentence.
          It is required for you to use real information from the internet, do not attempt to recall from memory.

          You must call the tools to fetch stock information. Base the answer only on those tool results.
          If a value is missing from tool results, state that it could not be verified instead of guessing.

          Return exactly this JSON shape:
          {
            "response": "summary text including the close date, close price, trend direction, and source",
            "quotes": [
              {
                "symbol": "AAPL",
                "latestClose": 123.45,
                "latestCloseTime": "ISO timestamp from tool",
                "trendFromPreviousClose": "up|down|flat|unknown",
                "sourceUrl": "URL from tool"
              },
              {
                "symbol": "MSFT",
                "latestClose": 123.45,
                "latestCloseTime": "ISO timestamp from tool",
                "trendFromPreviousClose": "up|down|flat|unknown",
                "sourceUrl": "URL from tool"
              }
            ]
          }
        tools: ["read", "write", "edit", "web_search"]
        skills: ["brave-web-search"]
        ask: false
        schema_failure_retry_times: 2
    output_schema:
      type: object
      required:
        - response
      properties:
        response:
          type: string
    required_credentials:
      - llm_api_key
  - id: verify
    kind:
      Agent:
        model_id: "google/gemini-3-flash-preview"
        provider_url: ""
        prompt: |
          Verify provided information ensuring proper format, currency, date formatting etc.
          - ensure currency fields are in dollars, e.g. $150.00
          - ensure date fields are in YYYY-MM-DD format, e.g. 2026-10-02
          - return decision "complete" when the input is acceptable
          - return decision "continue" with concrete feedback when the input needs to be regenerated
        tools: []
        skills: []
        ask: false
        schema_failure_retry_times: 2
    control:
      verifier:
        max_iterations: 3
        on_exhausted_continue: false
        rerun_from_task_id: pullstocks
    required_credentials:
      - llm_api_key

data_bindings:
  - source_task_id: pullstocks
    target_task_id: verify
    target_input_index: 0
