id: github-issue-pr-workflow

# Example workflow that works a GitHub issue through implementation, verifier
# review, PR creation when needed, and a final issue summary comment. The first
# task requires one input object:
# {
#   "repository": "owner/name",
#   "issue_number": 46
# }
#
# Tasks that run gh list gh_token in required_credentials. The worker exposes
# required credentials as uppercased environment variables during task execution.

tasks:
  - id: fetch-issue
    kind:
      Agent:
        model_id: "google/gemini-3-flash-preview"
        provider_url: ""
        prompt: |
          Use the input object to fetch the GitHub issue with the gh command.

          Requirements:
          - inputs[0].repository is the GitHub repository in owner/name form.
          - inputs[0].issue_number is the GitHub issue number.
          - run gh issue view with JSON fields that include number, title, body, labels, state, comments, and url.
          - do not rely on memory or browser search for issue content.

          Return exactly this JSON shape:
          {
            "repository": "owner/name",
            "issue_number": 123,
            "issue_url": "https://github.com/owner/name/issues/123",
            "title": "issue title",
            "state": "OPEN",
            "body": "issue body",
            "acceptance_criteria": ["criterion or requested task"],
            "summary": "short implementation-oriented summary"
          }
        tools: ["bash"]
        skills: []
        ask: false
        schema_failure_retry_times: 2
    input_schemas:
      - type: object
        required:
          - repository
          - issue_number
        properties:
          repository:
            type: string
            pattern: "^[^/\\s]+/[^/\\s]+$"
          issue_number:
            type: integer
            minimum: 1
    output_schema:
      type: object
      required:
        - repository
        - issue_number
        - issue_url
        - title
        - body
        - acceptance_criteria
        - summary
      properties:
        repository:
          type: string
        issue_number:
          type: integer
        issue_url:
          type: string
        title:
          type: string
        state:
          type: string
        body:
          type: string
        acceptance_criteria:
          type: array
          items:
            type: string
        summary:
          type: string
    workspace:
      group_name: repo
    required_credentials:
      - llm_api_key
      - gh_token

  - id: implement-change
    kind:
      Agent:
        model_id: "google/gemini-3-flash-preview"
        provider_url: ""
        prompt: |
          Implement the GitHub issue described in the upstream task data.

          Requirements:
          - use the selected workspace path for repository work
          - inspect the current checkout before editing, repository may need to be closed if doesn't exist in the workspace.
          - make the minimum reasonable code and documentation changes needed
          - run focused tests or checks that are relevant to the change
          - if the issue is unclear or a critical implementation decision is underspecified, call ask_user with a specific question
          - do not create a pull request in this task

          Return exactly this JSON shape:
          {
            "repository": "owner/name",
            "issue_number": 123,
            "summary": "what changed",
            "files_changed": ["relative/path"],
            "tests_run": ["command and result"],
            "open_questions": []
          }
        tools: ["read", "write", "edit", "bash", "ask_user"]
        skills: []
        ask: true
        schema_failure_retry_times: 2
        reuse_session: true
    output_schema:
      type: object
      required:
        - repository
        - issue_number
        - summary
        - files_changed
        - tests_run
        - open_questions
      properties:
        repository:
          type: string
        issue_number:
          type: integer
        summary:
          type: string
        files_changed:
          type: array
          items:
            type: string
        tests_run:
          type: array
          items:
            type: string
        open_questions:
          type: array
          items:
            type: string
    workspace:
      group_name: repo
    required_credentials:
      - llm_api_key

  - id: review-implementation
    kind:
      Agent:
        model_id: "google/gemini-3-flash-preview"
        provider_url: ""
        prompt: |
          Review the implementation against the upstream issue and the implement-change output.

          Requirements:
          - inspect the working tree and relevant files
          - verify the change satisfies the issue acceptance criteria
          - run or inspect the same relevant tests when practical
          - return decision "complete" only when the implementation is acceptable and tests pass
          - return decision "continue" with concrete, actionable feedback when more work is required
        tools: ["read", "bash"]
        skills: []
        ask: false
        schema_failure_retry_times: 2
        reuse_session: false
    control:
      verifier:
        max_iterations: 3
        on_exhausted_continue: false
        rerun_from_task_id: implement-change
    workspace:
      group_name: repo
    required_credentials:
      - llm_api_key

  - id: create-pull-request
    kind:
      Agent:
        model_id: "google/gemini-3-flash-preview"
        provider_url: ""
        prompt: |
          Create a GitHub pull request for the completed implementation when there are changes to publish.

          Requirements:
          - use git status and git diff to summarize the final changes
          - create a branch if the checkout is currently on the default branch
          - commit the changes with a concise issue-oriented commit message
          - push the branch
          - run gh pr create for the repository and issue when changes exist
          - include the issue number, what changed, and tests run in the PR body
          - if there are no changes to commit, do not create a PR
          - if no PR is created because the requested change is already in place, set pr_created to false, omit pr_number and pr_url, and explain that in summary

          Return exactly this JSON shape:
          {
            "repository": "owner/name",
            "issue_number": 123,
            "pr_created": true,
            "branch": "branch-name",
            "pr_number": 123,
            "pr_url": "https://github.com/owner/name/pull/123",
            "summary": "PR summary, or why no PR was needed"
          }
        tools: ["bash"]
        skills: []
        ask: false
        schema_failure_retry_times: 2
    output_schema:
      type: object
      required:
        - repository
        - issue_number
        - pr_created
        - summary
      properties:
        repository:
          type: string
        issue_number:
          type: integer
        pr_created:
          type: boolean
        branch:
          type: string
        pr_number:
          type: integer
        pr_url:
          type: string
        summary:
          type: string
    workspace:
      group_name: repo
    required_credentials:
      - llm_api_key
      - gh_token

  - id: update-github-issue
    kind:
      Agent:
        model_id: "google/gemini-3-flash-preview"
        provider_url: ""
        prompt: |
          Add a short final status comment to the GitHub issue.

          Requirements:
          - use the upstream fetch-issue data to identify the repository and issue number
          - use the upstream create-pull-request data to determine whether a PR was created
          - always add exactly one concise issue comment with gh issue comment
          - if a PR was created, include the PR number and URL in the comment
          - if no PR was created because no work was needed or the change was already in place, say that clearly
          - if no PR was created, omit pr_number and pr_url from the response
          - do not close the issue, reopen the issue, change labels, or otherwise mutate the issue beyond adding the comment

          Return exactly this JSON shape:
          {
            "repository": "owner/name",
            "issue_number": 123,
            "commented": true,
            "comment_summary": "short summary of the issue comment",
            "pr_number": 123,
            "pr_url": "https://github.com/owner/name/pull/123"
          }
        tools: ["bash"]
        skills: []
        ask: false
        schema_failure_retry_times: 2
    output_schema:
      type: object
      required:
        - repository
        - issue_number
        - commented
        - comment_summary
      properties:
        repository:
          type: string
        issue_number:
          type: integer
        commented:
          type: boolean
        comment_summary:
          type: string
        pr_number:
          type: integer
        pr_url:
          type: string
    workspace:
      group_name: repo
    required_credentials:
      - llm_api_key
      - gh_token

data_bindings:
  - source_task_id: fetch-issue
    target_task_id: implement-change
  - source_task_id: implement-change
    target_task_id: review-implementation
  - source_task_id: fetch-issue
    target_task_id: review-implementation
  - source_task_id: implement-change
    target_task_id: create-pull-request
  - source_task_id: review-implementation
    target_task_id: create-pull-request
  - source_task_id: fetch-issue
    target_task_id: update-github-issue
  - source_task_id: create-pull-request
    target_task_id: update-github-issue
