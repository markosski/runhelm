services:
  orchestrator:
    build:
      context: ./orchestrator
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      RUNHELM_WORKER_HTTP_ADDR: 0.0.0.0:3001
      RUNHELM_API_TOKENS: ${RUNHELM_API_TOKENS:-dev-token=default}
    volumes:
      - ${HOME}/.runhelm/sqlite:/home/runhelm/.runhelm/sqlite:rw
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 5s
      timeout: 2s
      retries: 12

  worker:
    build:
      context: ./worker
    depends_on:
      orchestrator:
        condition: service_healthy
    environment:
      RUNHELM_ORCHESTRATOR_HTTP_URL: http://orchestrator:3001
    volumes:
      - ${HOME}/.runhelm:/home/runhelm/.runhelm:ro
      - ${RUNHELM_SKILLS_DIR:-${HOME}/.runhelm/skills}:/home/runhelm/.pi/agent/skills:ro
      - runhelm-workspaces:/workspaces
      - runhelm-cache:/home/runhelm/.cache
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: on-failure
    deploy:
      replicas: 2

volumes:
  runhelm-workspaces:
  runhelm-cache:
