services:
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile.dev
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      RUNHELM_WORKER_HTTP_ADDR: 0.0.0.0:3001
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null && wget -qO- http://127.0.0.1:3001/health >/dev/null"]
      interval: 5s
      timeout: 2s
      retries: 12

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile.dev
    depends_on:
      orchestrator:
        condition: service_healthy
    environment:
      RUNHELM_ORCHESTRATOR_HTTP_URL: http://orchestrator:3001
      RUNHELM_WORKER_HOST_ID: compose-local-host
      RUNHELM_WORKSPACE_ROOT: /workspaces
    volumes:
      - ${HOME}/.runhelm:/home/runhelm/.runhelm:ro
      - ${RUNHELM_SKILLS_DIR:-${HOME}/.runhelm/skills}:/home/runhelm/.pi/agent/skills:ro
      - runhelm-workspaces:/workspaces
      - runhelm-cache:/home/runhelm/.cache
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: on-failure
    deploy:
      replicas: 2

volumes:
  runhelm-workspaces:
  runhelm-cache:
